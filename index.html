<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upbit Pattern Scanner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Upbit Scanner</h1>
        </div>
        <div class="status-pill" id="connectionStatus">준비 중</div>
      </header>

      <nav class="tabs" aria-label="화면 전환">
        <button class="tab active" data-tab="scanner" type="button">검색기</button>
        <button class="tab" data-tab="notes" type="button">매매 메모</button>
      </nav>

      <section class="tab-page active" id="scannerPage">
        <section class="chart-panel top-chart">
          <div class="panel-head">
            <div>
              <h2 id="chartTitle">BTCUSDT 차트</h2>
              <p>Binance 달러 기준 · 이동평균선과 거래량 참고</p>
            </div>
          </div>
          <div class="chart-box" id="tradingviewChart"></div>
        </section>

        <section class="workspace">
          <aside class="panel">
            <div class="panel-head">
              <h2>검색 조건</h2>
              <button class="icon-button" id="resetButton" type="button" title="조건 초기화">↺</button>
            </div>

            <p class="notice">검색 대상은 업비트 KRW 마켓입니다. 이동평균은 일봉 기준입니다.</p>

            <label>
              코인 그룹
              <select id="coinGroup">
                <option value="all">전체 KRW</option>
                <option value="major">메이저코인</option>
                <option value="kimchi">김치코인</option>
                <option value="new">신규코인</option>
                <option value="top20">Top20코인</option>
              </select>
            </label>

            <label>
              코인명, 심볼, 닉네임
              <input id="keyword" type="search" placeholder="예: BTC, 비트코인, 대장" autocomplete="off" />
            </label>

            <button class="filter-toggle active" id="tradeValueToggle" type="button" aria-pressed="true">
              24시간 거래대금 50억 이상
            </button>

            <div class="ma-grid">
              <label>
                1시간 MA20
                <select id="h1Ma20Mode">
                  <option value="off">무관</option>
                  <option value="above">캔들이 위</option>
                  <option value="below">캔들이 아래</option>
                </select>
              </label>
              <label>
                1시간 MA60
                <select id="h1Ma60Mode">
                  <option value="off">무관</option>
                  <option value="above">캔들이 위</option>
                  <option value="below">캔들이 아래</option>
                </select>
              </label>
              <label>
                1일 MA20
                <select id="d1Ma20Mode">
                  <option value="off">무관</option>
                  <option value="above">캔들이 위</option>
                  <option value="below">캔들이 아래</option>
                </select>
              </label>
              <label>
                1일 MA60
                <select id="d1Ma60Mode">
                  <option value="off">무관</option>
                  <option value="above">캔들이 위</option>
                  <option value="below">캔들이 아래</option>
                </select>
              </label>
            </div>

            <div class="range-row">
              <label>
                거래량 배수 최소
                <input id="minVolumeRatio" type="number" min="0" step="0.1" placeholder="예: 1.5" />
              </label>
              <label>
                거래량 평균 기간
                <select id="volumePeriod">
                  <option value="20">20일</option>
                  <option value="60">60일</option>
                </select>
              </label>
            </div>

            <div class="range-row">
              <label>
                매물대 조건
                <select id="levelMode">
                  <option value="off">사용 안 함</option>
                  <option value="breakout">저항 돌파</option>
                  <option value="support">지지 확인</option>
                </select>
              </label>
              <label>
                허용 오차(%)
                <input id="levelTolerance" type="number" min="0" step="0.1" value="2" />
              </label>
            </div>

            <label>
              결과 정렬
              <select id="sortBy">
                <option value="tradeValue">거래대금순</option>
                <option value="volumeRatio">거래량 배수순</option>
                <option value="maDistance">1H MA20 근접순</option>
                <option value="changeRate">변동률순</option>
              </select>
            </label>

            <div class="button-row">
              <button class="primary" id="searchButton" type="button">검색</button>
              <button id="exportButton" type="button">CSV</button>
            </div>
          </aside>

          <section class="scan-guide">
            <h2>검색 기준</h2>
            <p>거래대금 필터와 MA 위치 조건을 조합해 패턴이 확인되는 코인을 추립니다.</p>
          </section>
        </section>

        <section class="result-section">
          <div class="result-head">
            <div>
              <h2>검색 결과</h2>
              <p id="resultMeta">아직 검색하지 않았습니다.</p>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>코인</th>
                  <th>현재가</th>
                  <th>24시간</th>
                  <th>거래대금</th>
                  <th>1H MA20</th>
                  <th>1H MA60</th>
                  <th>1D MA20</th>
                  <th>1D MA60</th>
                  <th>거래량</th>
                  <th>매물대</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="results">
                <tr>
                  <td colspan="11" class="empty">조건을 설정하고 검색을 눌러주세요.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>

      <section class="tab-page" id="notesPage">
        <section class="memo-toolbar">
          <article class="memo-panel memo-form">
            <div class="panel-head">
              <h2>메모 추가</h2>
              <span id="memoSavedAt" class="saved-at">저장 대기</span>
            </div>
            <div class="memo-form-grid">
              <label>
                분류
                <select id="memoType">
                  <option value="rule">매매원칙</option>
                  <option value="tip">매매팁</option>
                </select>
              </label>
              <label>
                제목
                <input id="memoTitle" type="text" placeholder="예: BTC 우선 확인" />
              </label>
            </div>
            <label>
              내용
              <textarea id="memoBody" placeholder="반복해서 확인할 원칙이나 팁을 적어두세요."></textarea>
            </label>
            <div class="button-row">
              <button class="primary" id="addMemoButton" type="button">카드 저장</button>
              <button id="exportMemosButton" type="button">JSON 내보내기</button>
            </div>
          </article>
        </section>

        <section class="notes-layout">
          <article class="memo-panel">
            <div class="panel-head">
              <h2>매매원칙</h2>
              <span class="saved-at" id="ruleMemoCount">0개</span>
            </div>
            <div class="memo-list" id="ruleMemoList"></div>
          </article>
          <article class="memo-panel">
            <div class="panel-head">
              <h2>매매팁</h2>
              <span class="saved-at" id="tipMemoCount">0개</span>
            </div>
            <div class="memo-list" id="tipMemoList"></div>
          </article>
        </section>
      </section>
    </main>

    <script src="./memo-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
